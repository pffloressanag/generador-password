<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Contraseñas Seguras</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="contenedor">

<h1>🔐 Generador de Contraseñas</h1>

<input type="text" id="password" readonly>

<div class="opciones">

<label>
<input type="checkbox" id="mayusculas" checked>
Mayúsculas
</label>

<label>
<input type="checkbox" id="numeros" checked>
Números
</label>

<label>
<input type="checkbox" id="simbolos" checked>
Símbolos
</label>

</div>

<label>Longitud:</label>
<input type="number" id="longitud" value="12" min="6" max="30">

<div class="botones">
<button onclick="generarPassword()">Generar</button>
<button onclick="copiarPassword()">Copiar</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
